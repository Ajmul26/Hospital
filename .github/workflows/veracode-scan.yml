name: Veracode Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  veracode-sast-scan:
    runs-on: ubuntu-latest
    name: Veracode Static Application Security Testing
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: Build Spring Boot application
      run: |
        mvn clean compile
        mvn package -DskipTests
        
    - name: Build React frontend
      run: |
        cd frontend
        npm ci
        npm run build
        
    - name: Create upload package
      run: |
        mkdir -p veracode-artifacts
        cp target/*.jar veracode-artifacts/
        cd frontend && tar -czf ../veracode-artifacts/frontend-build.tar.gz build/
        
    - name: Veracode Upload and Scan
      uses: veracode/veracode-uploadandscan-action@0.2.7
      with:
        appname: 'Telecommunications Network Optimizer'
        createprofile: false
        filepath: 'veracode-artifacts/'
        vid: '${{ secrets.VERACODE_API_ID }}'
        vkey: '${{ secrets.VERACODE_API_KEY }}'
        version: '${{ github.run_id }}'
        
  veracode-pipeline-scan:
    runs-on: ubuntu-latest
    name: Veracode Pipeline Scan
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Build application
      run: |
        mvn clean package -DskipTests
        
    - name: Veracode Pipeline Scan
      uses: veracode/Veracode-pipeline-scan-action@v1.0.12
      with:
        vid: '${{ secrets.VERACODE_API_ID }}'
        vkey: '${{ secrets.VERACODE_API_KEY }}'
        file: 'target/*.jar'
        fail_build: true
        
    - name: Upload pipeline scan results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: pipeline-scan-results
        path: results.json
        
  veracode-iac-scan:
    runs-on: ubuntu-latest
    name: Veracode Infrastructure as Code Scan
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Veracode IaC Scan
      env:
        VERACODE_API_KEY_ID: ${{ secrets.VERACODE_API_ID }}
        VERACODE_API_KEY_SECRET: ${{ secrets.VERACODE_API_KEY }}
      run: |
        curl -fsS https://tools.veracode.com/veracode-cli/install | sh
        ./veracode scan --type directory --source . --format table
        
  security-summary:
    runs-on: ubuntu-latest
    name: Security Scan Summary
    needs: [veracode-sast-scan, veracode-pipeline-scan, veracode-iac-scan]
    if: always()
    
    steps:
    - name: Create security summary
      run: |
        echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "- SAST Scan: ${{ needs.veracode-sast-scan.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Pipeline Scan: ${{ needs.veracode-pipeline-scan.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- IaC Scan: ${{ needs.veracode-iac-scan.result }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
        echo "1. Review scan results in Veracode platform" >> $GITHUB_STEP_SUMMARY
        echo "2. Address any critical or high severity findings" >> $GITHUB_STEP_SUMMARY
        echo "3. Update security documentation as needed" >> $GITHUB_STEP_SUMMARY