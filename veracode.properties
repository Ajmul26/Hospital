# Veracode Configuration Properties
# WARNING: Never commit actual credentials to version control

# Veracode API Credentials (set as environment variables or Maven properties)
# veracode.vid=YOUR_VERACODE_API_ID
# veracode.vkey=YOUR_VERACODE_API_KEY

# Application Configuration
veracode.app.name=spring-crud-h2-app
veracode.app.description=Spring Boot CRUD Application with H2 Database - Security Scan
veracode.business.criticality=High
veracode.policy=Veracode Recommended SCA + SAST

# Scan Configuration
veracode.scan.include.pattern=*.jar,*.war
veracode.scan.exclude.pattern=*test*.jar,*javadoc*.jar,*sources*.jar
veracode.create.profile=true
veracode.create.sandbox=true
veracode.sandbox.name=development

# Teams and Distribution
veracode.teams=Development,Security,QA
veracode.auto.scan=false
veracode.scan.frequency=weekly

# Scan Policies
veracode.fail.build.on.policy.fail=true
veracode.timeout=60

# SCA (Software Composition Analysis) Settings
veracode.sca.enabled=true
veracode.sca.fail.on.severity=Medium
veracode.sca.update.database=true

# Pipeline Integration
veracode.pipeline.scan=true
veracode.pipeline.timeout=30
veracode.pipeline.fail.on.severity=Medium
veracode.pipeline.results.format=json

# Reporting
veracode.report.format=pdf,xml,json
veracode.report.output.dir=target/veracode-reports/
veracode.generate.baseline=true