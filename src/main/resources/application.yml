server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: Network Optimizer
  
  data:
    mongodb:
      uri: mongodb://localhost:27017/telecom_network_optimizer
      auto-index-creation: true
  
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: NON_NULL
  
  security:
    user:
      name: admin
      password: admin123
      roles: ADMIN

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: method
    tags-sorter: alpha
    filter: true

# Management and Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    export:
      prometheus:
        enabled: true

# Application-specific configuration
app:
  jwt:
    secret: TelecomNetworkOptimizerSecretKey2024ForJWTTokenGeneration
    expiration: 86400000 # 24 hours
  
  network:
    monitoring:
      interval-seconds: 30
      batch-size: 100
    
    optimization:
      algorithm: genetic # genetic, simulated_annealing, particle_swarm
      max-iterations: 1000
      convergence-threshold: 0.001

# Logging
logging:
  level:
    com.telecom.networkoptimizer: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/network-optimizer.log