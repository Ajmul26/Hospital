# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# H2 Console (for development/testing)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.filter=true

# Splunk Configuration
# Enable Splunk logging (set to true to enable)
splunk.enabled=false

# Splunk HTTP Event Collector (HEC) Configuration
splunk.hec.url=http://localhost:8088
splunk.hec.token=YOUR_SPLUNK_HEC_TOKEN_HERE
splunk.hec.disable-certificate-validation=false
splunk.hec.batch-interval=10000
splunk.hec.batch-size=100
splunk.hec.batch-count=10
splunk.hec.retry-count=3

# Splunk Index and Source Configuration
splunk.index=main
splunk.source=spring-boot-user-management
splunk.sourcetype=spring-boot

# Splunk Metrics Configuration
splunk.metrics.enabled=true
splunk.metrics.interval-seconds=60
splunk.metrics.prefix=spring.boot.app

# Spring Boot Actuator Configuration for Metrics
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true
management.metrics.export.prometheus.enabled=true